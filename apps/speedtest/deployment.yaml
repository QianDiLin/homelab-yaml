apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-tracker
  namespace: default

spec:
  replicas: 1

  selector:
    matchLabels:
      app: speedtest-tracker

  template:
    metadata:
      labels:
        app: speedtest-tracker

    spec:
      initContainers:
        - name: init-db
          image: busybox
          command:
            - sh
            - -c
            - |
              mkdir -p /config
              touch /config/database.sqlite
              chmod 666 /config/database.sqlite
          volumeMounts:
            - name: speedtest-data
              mountPath: /config

      containers:
        - name: speedtest-tracker
          image: lscr.io/linuxserver/speedtest-tracker:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: speedtest-secrets
                  key: APP_KEY

            - name: DB_CONNECTION
              value: sqlite

            - name: DB_DATABASE
              value: /config/database.sqlite

            - name: SPEEDTEST_SCHEDULE
              value: "0 */6 * * *"

            - name: DISPLAY_TIMEZONE
              value: America/New_York

          volumeMounts:
            - name: speedtest-data
              mountPath: /config

      volumes:
        - name: speedtest-data
          emptyDir: {}