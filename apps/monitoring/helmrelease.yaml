apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "85.0.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 12h
  values:
    grafana:
      enabled: true
      adminPassword: "ChangeThisGrafanaPassword"

      service:
        type: LoadBalancer

      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - grafana.home.arpa
        path: /
        pathType: Prefix

      persistence:
        enabled: true
        size: 10Gi

    prometheus:
      prometheusSpec:
        retention: 24h
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi