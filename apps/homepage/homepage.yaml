apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage

data:
  settings.yaml: |
    title: Qian's Homelab
    theme: dark
    color: slate
    headerStyle: boxed

    layout:
      Status:
        style: column
        columns: 1
      Infrastructure:
        style: column
        columns: 2
      Apps:
        style: column
        columns: 2
      Network:
        style: column
        columns: 2
      Monitoring:
        style: column
        columns: 2

  services.yaml: |
    - Status:
        - Pi-hole:
            href: http://192.168.1.10
            description: Network DNS ad-blocking
            icon: pi-hole.png
            widget:
              type: pihole
              url: http://192.168.1.10
              version: 6
              key: "{{HOMEPAGE_VAR_PIHOLE_KEY}}"
              fields: ["queries", "blocked", "blocked_percent", "gravity"]

        - Uptime Kuma:
            href: http://uptime.home.arpa/status/home
            description: Homelab service uptime
            icon: uptime-kuma.png
            widget:
              type: uptimekuma
              url: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
              slug: home
              fields: ["up", "down", "uptime", "incident"]
    
    - Infrastructure:
        - Kubernetes:
            href: https://github.com/QianDiLin/homelab-yaml
            description: Talos Kubernetes cluster
            icon: kubernetes.png

        - Traefik:
            href: http://localhost:8080/dashboard/#/
            description: Dashboard via local port-forward
            icon: traefik.png

        - Longhorn:
            href: http://longhorn.home.arpa
            description: Kubernetes persistent storage
            icon: longhorn.png

        - Proxmox:
            href: https://192.168.1.158:8006
            description: Virtualization host
            icon: proxmox.png

    - Apps:
        - Homepage:
            href: http://homepage.home.arpa
            description: Homelab dashboard
            icon: homepage.png

        - Home Assistant:
            href: http://homeassistant.home.arpa
            description: Smart home dashboard
            icon: home-assistant.png

        - Vaultwarden:
            href: https://vaultwarden.home.arpa
            description: Password manager
            icon: vaultwarden.png

    - Network:
        - OPNsense:
            href: https://192.168.1.1
            description: Firewall, router, VLANs, and DHCP
            icon: opnsense.png

        - MetalLB:
            href: http://192.168.1.240
            description: Kubernetes LoadBalancer IP service
            icon: kubernetes.png


  bookmarks.yaml: |
    - Homelab:
        - Proxmox:
            - href: http://proxmox.home.arpa

        - OPNsense:
            - href: https://192.168.1.1

        - Pi-hole:
            - href: http://pi.hole/admin

    - Learning:
        - Kubernetes Docs:
            - href: https://kubernetes.io/docs/

        - Talos Docs:
            - href: https://www.talos.dev/

        - Longhorn Docs:
            - href: https://longhorn.io/docs/

  widgets.yaml: |
    - search:
        provider: google
        target: _blank

    - resources:
        cpu: true
        memory: true
        disk: /

  docker.yaml: |
    {}

  kubernetes.yaml: |
    mode: disabled